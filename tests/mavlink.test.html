<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meridian GCS — MAVLink Unit Tests</title>
    <style>
        body { font-family: 'Consolas', 'JetBrains Mono', monospace; background: #0d0d1a; color: #e0e0e0; padding: 20px; }
        h1 { color: #2196f3; font-size: 18px; margin-bottom: 12px; }
        .pass { color: #4caf50; }
        .fail { color: #f44336; }
        .section { color: #ff9800; margin-top: 16px; font-weight: bold; }
        #results { white-space: pre-wrap; line-height: 1.6; }
        .summary { margin-top: 20px; padding: 10px; border: 1px solid #1e3a5f; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>MAVLink Unit Tests</h1>
    <div id="results"></div>

    <!-- Load only mavlink.js (standalone module) -->
    <script src="../js/mavlink.js"></script>

    <script>
    (function () {
        'use strict';

        var results = document.getElementById('results');
        var passed = 0;
        var failed = 0;

        function log(msg) {
            results.innerHTML += msg + '\n';
            console.log(msg.replace(/<[^>]+>/g, ''));
        }

        function assert(condition, testName) {
            if (condition) {
                passed++;
                log('<span class="pass">  PASS</span> ' + testName);
            } else {
                failed++;
                log('<span class="fail">  FAIL</span> ' + testName);
            }
        }

        function assertEqual(actual, expected, testName) {
            if (actual === expected) {
                passed++;
                log('<span class="pass">  PASS</span> ' + testName);
            } else {
                failed++;
                log('<span class="fail">  FAIL</span> ' + testName + ' (expected ' + expected + ', got ' + actual + ')');
            }
        }

        function assertClose(actual, expected, tolerance, testName) {
            if (Math.abs(actual - expected) <= tolerance) {
                passed++;
                log('<span class="pass">  PASS</span> ' + testName);
            } else {
                failed++;
                log('<span class="fail">  FAIL</span> ' + testName + ' (expected ~' + expected + ', got ' + actual + ')');
            }
        }

        function section(name) {
            log('\n<span class="section">[' + name + ']</span>');
        }

        // ================================================================
        // CRC Tests
        // ================================================================
        section('CRC-X.25');

        // Known MAVLink CRC test: empty data with CRC extra 0
        var crc1 = MAVLink.crc16(new Uint8Array([]), 0);
        // CRC of empty with extra 0 should follow X.25 algorithm
        assert(typeof crc1 === 'number', 'crc16 returns a number');
        assert(crc1 >= 0 && crc1 <= 0xFFFF, 'crc16 returns 16-bit value');

        // CRC with known bytes should be deterministic
        var crc2a = MAVLink.crc16(new Uint8Array([1, 2, 3, 4]), 50);
        var crc2b = MAVLink.crc16(new Uint8Array([1, 2, 3, 4]), 50);
        assertEqual(crc2a, crc2b, 'CRC is deterministic for same input');

        // Different data should produce different CRC
        var crc3 = MAVLink.crc16(new Uint8Array([5, 6, 7, 8]), 50);
        assert(crc2a !== crc3, 'Different data produces different CRC');

        // Different CRC extras should produce different results
        var crc4a = MAVLink.crc16(new Uint8Array([1, 2, 3]), 50);
        var crc4b = MAVLink.crc16(new Uint8Array([1, 2, 3]), 100);
        assert(crc4a !== crc4b, 'Different CRC extras produce different results');

        // ================================================================
        // CRC_EXTRA Table Tests
        // ================================================================
        section('CRC_EXTRA Table');

        assertEqual(MAVLink.CRC_EXTRA[0], 50, 'HEARTBEAT CRC_EXTRA = 50');
        assertEqual(MAVLink.CRC_EXTRA[33], 104, 'GLOBAL_POSITION_INT CRC_EXTRA = 104');
        assertEqual(MAVLink.CRC_EXTRA[51], 196, 'MISSION_REQUEST_INT CRC_EXTRA = 196');
        assertEqual(MAVLink.CRC_EXTRA[253], 83, 'STATUSTEXT CRC_EXTRA = 83');

        // T1-27: New message CRC extras
        assertEqual(MAVLink.CRC_EXTRA[242], 104, 'HOME_POSITION CRC_EXTRA = 104');
        assertEqual(MAVLink.CRC_EXTRA[147], 154, 'BATTERY_STATUS CRC_EXTRA = 154');
        assertEqual(MAVLink.CRC_EXTRA[162], 189, 'FENCE_STATUS CRC_EXTRA = 189');
        assertEqual(MAVLink.CRC_EXTRA[241], 90, 'VIBRATION CRC_EXTRA = 90');
        assertEqual(MAVLink.CRC_EXTRA[148], 178, 'AUTOPILOT_VERSION CRC_EXTRA = 178');

        // T1-5: ADSB
        assertEqual(MAVLink.CRC_EXTRA[246], 184, 'ADSB_VEHICLE CRC_EXTRA = 184');

        // T1-12: Remote ID
        assertEqual(MAVLink.CRC_EXTRA[12900], 114, 'OPEN_DRONE_ID_BASIC_ID CRC_EXTRA = 114');
        assertEqual(MAVLink.CRC_EXTRA[12901], 254, 'OPEN_DRONE_ID_LOCATION CRC_EXTRA = 254');
        assertEqual(MAVLink.CRC_EXTRA[12904], 77, 'OPEN_DRONE_ID_SYSTEM CRC_EXTRA = 77');

        // ================================================================
        // Frame Parser Tests
        // ================================================================
        section('Frame Parser');

        var parser = new MAVLink.FrameParser();
        assert(parser instanceof MAVLink.FrameParser, 'FrameParser can be instantiated');

        // Empty extract
        var empty = parser.extract();
        assertEqual(empty.length, 0, 'Empty parser extracts no messages');

        // Push garbage data
        parser.push(new Uint8Array([0x01, 0x02, 0x03, 0x04]));
        var garbage = parser.extract();
        assertEqual(garbage.length, 0, 'Garbage data produces no messages');

        // ================================================================
        // Encode / Decode Roundtrip Tests
        // ================================================================
        section('Encode/Decode Roundtrip');

        // GCS Heartbeat roundtrip
        var hbFrame = MAVLink.encodeGcsHeartbeat();
        assert(hbFrame instanceof Uint8Array, 'encodeGcsHeartbeat returns Uint8Array');
        assert(hbFrame[0] === 0xFD, 'GCS heartbeat starts with MAVLink STX (0xFD)');
        var hbMsgId = hbFrame[7] | (hbFrame[8] << 8) | (hbFrame[9] << 16);
        assertEqual(hbMsgId, 0, 'GCS heartbeat has msg_id = 0 (HEARTBEAT)');

        var p2 = new MAVLink.FrameParser();
        p2.push(hbFrame);
        var hbMsgs = p2.extract();
        assertEqual(hbMsgs.length, 1, 'GCS heartbeat roundtrip: 1 message extracted');
        assertEqual(hbMsgs[0].type, 'heartbeat', 'Decoded type is heartbeat');
        assertEqual(hbMsgs[0].mav_type, 6, 'GCS heartbeat mav_type = 6 (GCS)');

        // ARM command roundtrip
        var armFrame = MAVLink.encodeArm(1);
        assert(armFrame instanceof Uint8Array, 'encodeArm returns Uint8Array');
        var p3 = new MAVLink.FrameParser();
        p3.push(armFrame);
        var armMsgs = p3.extract();
        assertEqual(armMsgs.length, 1, 'ARM roundtrip: 1 message extracted');
        // ARM is a COMMAND_LONG, decoded type is command_ack or null (we encode but cant decode our own COMMAND_LONG as ACK)
        // Actually COMMAND_LONG msg_id=76 is decoded... let's check
        assert(armFrame[7] === 76, 'ARM frame msg_id byte = 76 (COMMAND_LONG)');

        // DISARM
        var disarmFrame = MAVLink.encodeDisarm(1);
        assert(disarmFrame[0] === 0xFD, 'DISARM frame starts with STX');

        // SET_MODE
        var modeFrame = MAVLink.encodeSetMode('GUIDED', 1);
        assert(modeFrame[0] === 0xFD, 'SET_MODE frame starts with STX');

        // MISSION_COUNT
        var mcFrame = MAVLink.encodeMissionCount(5, 1);
        var p4 = new MAVLink.FrameParser();
        p4.push(mcFrame);
        var mcMsgs = p4.extract();
        assertEqual(mcMsgs.length, 1, 'MISSION_COUNT roundtrip: 1 message');
        assertEqual(mcMsgs[0].type, 'mission_count', 'Decoded type is mission_count');
        assertEqual(mcMsgs[0].count, 5, 'Mission count = 5');

        // MISSION_ITEM_INT
        var miFrame = MAVLink.encodeMissionItemInt(0, 35.7516, -120.7710, 50, 16, 1);
        var p5 = new MAVLink.FrameParser();
        p5.push(miFrame);
        var miMsgs = p5.extract();
        assertEqual(miMsgs.length, 1, 'MISSION_ITEM_INT roundtrip: 1 message');
        assertEqual(miMsgs[0].type, 'mission_item', 'Decoded type is mission_item');
        assertEqual(miMsgs[0].seq, 0, 'Mission item seq = 0');
        assertEqual(miMsgs[0].command, 16, 'Mission item command = 16 (NAV_WAYPOINT)');
        assertClose(miMsgs[0].lat, 35.7516, 0.0001, 'Mission item lat roundtrip');
        assertClose(miMsgs[0].lon, -120.7710, 0.0001, 'Mission item lon roundtrip');

        // T1-1: MISSION_REQUEST_INT encoder
        var mrFrame = MAVLink.encodeMissionRequestInt(3, 1);
        assert(mrFrame instanceof Uint8Array, 'encodeMissionRequestInt returns Uint8Array');
        assert(mrFrame[0] === 0xFD, 'MISSION_REQUEST_INT starts with STX');
        var mrMsgId = mrFrame[7] | (mrFrame[8] << 8) | (mrFrame[9] << 16);
        assertEqual(mrMsgId, 51, 'MISSION_REQUEST_INT msg_id = 51');

        // T1-1: MISSION_ITEM_INT_FULL encoder
        var fullWp = { seq: 2, lat: 34.0, lon: -118.0, alt: 100, command: 16, frame: 6, param1: 0, param2: 0, param3: 0, param4: 0 };
        var fullFrame = MAVLink.encodeMissionItemIntFull(fullWp, 1);
        var p6 = new MAVLink.FrameParser();
        p6.push(fullFrame);
        var fullMsgs = p6.extract();
        assertEqual(fullMsgs.length, 1, 'MISSION_ITEM_INT_FULL roundtrip: 1 message');
        assertEqual(fullMsgs[0].seq, 2, 'Full mission item seq = 2');

        // T1-2: FENCE_POINT encoder
        var fpFrame = MAVLink.encodeFencePoint(0, 4, 35.75, -120.77, 1);
        assert(fpFrame instanceof Uint8Array, 'encodeFencePoint returns Uint8Array');
        assert(fpFrame[0] === 0xFD, 'FENCE_POINT starts with STX');

        // ================================================================
        // Multi-frame Parsing
        // ================================================================
        section('Multi-frame Parsing');

        var p7 = new MAVLink.FrameParser();
        // Push two frames concatenated
        var f1 = MAVLink.encodeGcsHeartbeat();
        var f2 = MAVLink.encodeMissionCount(10, 1);
        var combined = new Uint8Array(f1.length + f2.length);
        combined.set(f1, 0);
        combined.set(f2, f1.length);
        p7.push(combined);
        var multi = p7.extract();
        assertEqual(multi.length, 2, 'Two concatenated frames: 2 messages extracted');
        assertEqual(multi[0].type, 'heartbeat', 'First message is heartbeat');
        assertEqual(multi[1].type, 'mission_count', 'Second message is mission_count');
        assertEqual(multi[1].count, 10, 'Mission count = 10');

        // ================================================================
        // MSG_ID Constants
        // ================================================================
        section('MSG_ID Constants');

        assertEqual(MAVLink.MSG_ID.HEARTBEAT, 0, 'MSG_ID.HEARTBEAT = 0');
        assertEqual(MAVLink.MSG_ID.GLOBAL_POSITION_INT, 33, 'MSG_ID.GLOBAL_POSITION_INT = 33');
        assertEqual(MAVLink.MSG_ID.MISSION_REQUEST_INT, 51, 'MSG_ID.MISSION_REQUEST_INT = 51');
        assertEqual(MAVLink.MSG_ID.HOME_POSITION, 242, 'MSG_ID.HOME_POSITION = 242');
        assertEqual(MAVLink.MSG_ID.BATTERY_STATUS, 147, 'MSG_ID.BATTERY_STATUS = 147');
        assertEqual(MAVLink.MSG_ID.FENCE_STATUS, 162, 'MSG_ID.FENCE_STATUS = 162');
        assertEqual(MAVLink.MSG_ID.VIBRATION, 241, 'MSG_ID.VIBRATION = 241');
        assertEqual(MAVLink.MSG_ID.AUTOPILOT_VERSION, 148, 'MSG_ID.AUTOPILOT_VERSION = 148');
        assertEqual(MAVLink.MSG_ID.ADSB_VEHICLE, 246, 'MSG_ID.ADSB_VEHICLE = 246');
        assertEqual(MAVLink.MSG_ID.OPEN_DRONE_ID_BASIC_ID, 12900, 'MSG_ID.OPEN_DRONE_ID_BASIC_ID = 12900');
        assertEqual(MAVLink.MSG_ID.OPEN_DRONE_ID_LOCATION, 12901, 'MSG_ID.OPEN_DRONE_ID_LOCATION = 12901');
        assertEqual(MAVLink.MSG_ID.OPEN_DRONE_ID_SYSTEM, 12904, 'MSG_ID.OPEN_DRONE_ID_SYSTEM = 12904');

        // ================================================================
        // Bad CRC Rejection
        // ================================================================
        section('Bad CRC Rejection');

        var goodFrame = MAVLink.encodeGcsHeartbeat();
        // Corrupt one CRC byte
        var badFrame = new Uint8Array(goodFrame);
        badFrame[badFrame.length - 1] ^= 0xFF; // flip bits
        var p8 = new MAVLink.FrameParser();
        p8.push(badFrame);
        var badResult = p8.extract();
        assertEqual(badResult.length, 0, 'Corrupted CRC produces no messages');

        // ================================================================
        // Buffer Overflow Protection
        // ================================================================
        section('Buffer Overflow Protection');

        var p9 = new MAVLink.FrameParser();
        // Push 70KB of data (exceeds 64KB cap)
        var bigData = new Uint8Array(70000);
        p9.push(bigData);
        // Should have reset buffer
        var overflowResult = p9.extract();
        assertEqual(overflowResult.length, 0, 'Buffer overflow: no crash, no messages');

        // ================================================================
        // Summary
        // ================================================================
        var total = passed + failed;
        var summary = '\n<div class="summary">';
        if (failed === 0) {
            summary += '<span class="pass">ALL ' + total + ' TESTS PASSED</span>';
        } else {
            summary += '<span class="fail">' + failed + ' FAILED</span> / ' + total + ' total';
        }
        summary += '</div>';
        log(summary);
        console.log('MAVLink tests: ' + passed + ' passed, ' + failed + ' failed');
    })();
    </script>
</body>
</html>
